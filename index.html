<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ForgeDuel" />
    <meta name="screen-orientation" content="landscape" />
    <title>ForgeDuel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="loading-screen" aria-live="polite">
        <div id="loading-card">
          <div id="loading-title">ForgeDuel</div>
          <div id="loading-subtitle">Preparing build...</div>
          <div id="loading-bar-track">
            <div id="loading-bar-fill"></div>
          </div>
        </div>
      </div>
      <div id="orientation-overlay">
        <div id="orientation-card">
          <div id="orientation-icon">📱</div>
          <div id="orientation-text">请横屏游玩</div>
          <div id="orientation-subtext">Rotate your device to landscape</div>
        </div>
      </div>
      <div id="game-root"></div>
      <button id="fullscreen-btn" title="全屏">⛶</button>
      <div id="settings-panel">
        <div id="settings-panel-inner">
          <div id="settings-title">Options</div>

          <div class="settings-row">
            <span class="settings-label">声音</span>
            <button class="settings-checkbox" id="settings-sfx-toggle" data-on="true">✓</button>
          </div>
          <div class="settings-row">
            <span class="settings-label">音乐</span>
            <button class="settings-checkbox" id="settings-bgm-toggle" data-on="true">✓</button>
          </div>
          <div class="settings-row">
            <span class="settings-label">闪烁的视觉特效</span>
            <button class="settings-checkbox" id="settings-shake-toggle" data-on="true">✓</button>
          </div>
          <div class="settings-row">
            <span class="settings-label">Visible joystick</span>
            <button class="settings-checkbox" id="settings-joystick-toggle" data-on="true">✓</button>
          </div>
          <div class="settings-row">
            <span class="settings-label">Damage Numbers</span>
            <button class="settings-checkbox" id="settings-dmg-toggle" data-on="true">✓</button>
          </div>

          <button id="settings-reset-upgrades">回退增强</button>

          <div id="settings-auth-section" style="display:none;">
            <div class="settings-row settings-user-row" style="border-bottom:none;">
              <span class="settings-label">账号</span>
              <span id="settings-username" style="color:#88ff88;font-size:14px;"></span>
            </div>
            <button id="settings-logout-btn" style="margin-top:8px;width:100%;padding:10px 0;border-radius:4px;border:2px solid rgba(255,100,100,0.5);background:rgba(80,20,20,0.8);color:#ff8888;font-family:'Zpix',sans-serif;font-size:14px;cursor:pointer;">退出登录</button>
          </div>

          <button id="settings-close">返回</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script>
      (function() {
        var overlay = document.getElementById('orientation-overlay');
        var fsBtn = document.getElementById('fullscreen-btn');
        var settingsPanel = document.getElementById('settings-panel');

        function checkOrientation() {
          var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
          if (!isMobile) {
            overlay.style.display = 'none';
            return;
          }
          var isLandscape = window.innerWidth > window.innerHeight;
          overlay.style.display = isLandscape ? 'none' : 'flex';
        }

        window.addEventListener('orientationchange', function() {
          setTimeout(checkOrientation, 150);
        });
        window.addEventListener('resize', checkOrientation);
        checkOrientation();

        if (fsBtn) {
          fsBtn.addEventListener('click', function() {
            var el = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
              (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
              if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function() {});
              }
            } else {
              (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
            }
          });
          var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
          if (!isMobile) fsBtn.style.display = 'none';
        }

        // Settings panel
        var SETTINGS_KEY = 'forgeduel_settings';
        var defaults = { bgmVol: 60, sfxVol: 80, showDmgNum: true, screenShake: true, showJoystick: true };
        var settings = Object.assign({}, defaults);

        try {
          var saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
          if (saved) Object.assign(settings, saved);
        } catch(e) {}

        function saveSettings() {
          try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {}
        }

        function applySettings() {
          if (window.__forgeduelGame && window.__forgeduelGame.scene) {
            var gs = window.__forgeduelGame.scene.getScene('GameScene');
            if (gs) {
              gs.settingsBgmVol = settings.bgmVol / 100;
              gs.settingsSfxVol = settings.sfxVol / 100;
              gs.settingsShowDmgNum = settings.showDmgNum;
              gs.settingsScreenShake = settings.screenShake;
            }
          }
        }

        var sfxToggle = document.getElementById('settings-sfx-toggle');
        var bgmToggle = document.getElementById('settings-bgm-toggle');
        var shakeToggle = document.getElementById('settings-shake-toggle');
        var joystickToggle = document.getElementById('settings-joystick-toggle');
        var dmgToggle = document.getElementById('settings-dmg-toggle');
        var closeBtn = document.getElementById('settings-close');
        var resetBtn = document.getElementById('settings-reset-upgrades');

        function updateCheckbox(el, isOn) {
          el.textContent = isOn ? '✓' : '';
          el.dataset.on = String(isOn);
        }

        updateCheckbox(sfxToggle, settings.sfxVol > 0);
        updateCheckbox(bgmToggle, settings.bgmVol > 0);
        updateCheckbox(shakeToggle, settings.screenShake);
        updateCheckbox(joystickToggle, settings.showJoystick !== false);
        updateCheckbox(dmgToggle, settings.showDmgNum);

        sfxToggle.addEventListener('click', function() {
          var isOn = this.dataset.on !== 'true';
          settings.sfxVol = isOn ? 80 : 0;
          updateCheckbox(this, isOn);
          saveSettings();
          applySettings();
        });
        bgmToggle.addEventListener('click', function() {
          var isOn = this.dataset.on !== 'true';
          settings.bgmVol = isOn ? 60 : 0;
          updateCheckbox(this, isOn);
          saveSettings();
          applySettings();
        });
        shakeToggle.addEventListener('click', function() {
          settings.screenShake = !settings.screenShake;
          updateCheckbox(this, settings.screenShake);
          saveSettings();
          applySettings();
        });
        joystickToggle.addEventListener('click', function() {
          settings.showJoystick = !settings.showJoystick;
          updateCheckbox(this, settings.showJoystick);
          saveSettings();
          applySettings();
        });
        dmgToggle.addEventListener('click', function() {
          settings.showDmgNum = !settings.showDmgNum;
          updateCheckbox(this, settings.showDmgNum);
          saveSettings();
          applySettings();
        });

        resetBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (!confirm('确定要回退所有增强吗？这将退还所有花费的金币。')) return;
          var UPGRADE_STORAGE_KEY = 'forgeduel_shop_upgrades_v1';
          var COIN_STORAGE_KEY = 'forgeduel_coins';
          try {
            var raw = localStorage.getItem(UPGRADE_STORAGE_KEY);
            var upgrades = raw ? JSON.parse(raw) : {};
            var totalRefund = 0;
            var defs = [
              {key:'power',baseCost:200,costStep:100},
              {key:'max_hp',baseCost:200,costStep:100},
              {key:'armor',baseCost:600,costStep:200},
              {key:'amount',baseCost:5000,costStep:0},
              {key:'cooldown',baseCost:900,costStep:300},
              {key:'area',baseCost:300,costStep:150},
              {key:'speed',baseCost:300,costStep:150},
              {key:'duration',baseCost:300,costStep:150},
              {key:'move_speed2',baseCost:300,costStep:150},
              {key:'magnet',baseCost:300,costStep:150},
              {key:'luck',baseCost:600,costStep:200},
              {key:'growth',baseCost:900,costStep:300}
            ];
            defs.forEach(function(d) {
              var level = upgrades[d.key] || 0;
              for (var i = 0; i < level; i++) {
                totalRefund += d.baseCost + i * d.costStep;
              }
            });
            localStorage.removeItem(UPGRADE_STORAGE_KEY);
            var currentCoins = Number(localStorage.getItem(COIN_STORAGE_KEY)) || 0;
            localStorage.setItem(COIN_STORAGE_KEY, String(currentCoins + totalRefund));
            alert('已回退增强，退还 ' + totalRefund + ' 金币');
            // Refresh menu coin display if visible
            if (window.__forgeduelGame && window.__forgeduelGame.scene) {
              var menu = window.__forgeduelGame.scene.getScene('MainMenuScene');
              if (menu && menu.topBar) {
                var newCoins = Number(localStorage.getItem(COIN_STORAGE_KEY)) || 0;
                menu.topBar.setCoins(newCoins);
              }
            }
          } catch(err) {}
        });

        function openSettings() {
          settingsPanel.classList.add('open');
          applySettings();
          refreshAuthSection();
          var menu = window.__forgeduelGame && window.__forgeduelGame.scene && window.__forgeduelGame.scene.getScene('MainMenuScene');
          if (menu && menu.showBackButton) menu.showBackButton(true);
        }
        function closeSettings() {
          settingsPanel.classList.remove('open');
          var gameRoot = document.getElementById('game-root');
          if (gameRoot) {
            gameRoot.style.pointerEvents = 'none';
            setTimeout(function() { gameRoot.style.pointerEvents = ''; }, 200);
          }
          var menu = window.__forgeduelGame && window.__forgeduelGame.scene && window.__forgeduelGame.scene.getScene('MainMenuScene');
          if (menu && menu.showBackButton) menu.showBackButton(false);
        }

        closeBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); closeSettings(); });
        settingsPanel.addEventListener('click', function(e) {
          if (e.target === settingsPanel) { e.preventDefault(); e.stopPropagation(); closeSettings(); }
        });

        document.querySelectorAll('#settings-panel button, #settings-panel input, #settings-panel select').forEach(function(el) {
          el.addEventListener('click', function(e) { e.stopPropagation(); });
          el.addEventListener('mousedown', function(e) { e.stopPropagation(); });
        });

        // --- Cookie auth helpers ---
        function getCookie(name) {
          var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
          return m ? decodeURIComponent(m[1]) : null;
        }

        function getStoredUser() {
          try {
            var raw = localStorage.getItem('forgeduel_user');
            return raw ? JSON.parse(raw) : null;
          } catch(e) { return null; }
        }

        function refreshAuthSection() {
          var section = document.getElementById('settings-auth-section');
          var nameEl = document.getElementById('settings-username');
          var token = localStorage.getItem('forgeduel_token') || getCookie('forgeduel_token');
          var user = getStoredUser();
          if (token && user && user.username) {
            section.style.display = '';
            nameEl.textContent = user.username;
          } else {
            section.style.display = 'none';
          }
        }

        // Auto-login from cookie if no token in localStorage
        (function autoLogin() {
          var hasLocalToken = !!localStorage.getItem('forgeduel_token');
          if (hasLocalToken) return;
          var cookieToken = getCookie('forgeduel_token');
          if (!cookieToken) return;
          fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + cookieToken }
          }).then(function(r) {
            if (!r.ok) throw new Error('unauthorized');
            return r.json();
          }).then(function(data) {
            if (data.user) {
              localStorage.setItem('forgeduel_token', cookieToken);
              localStorage.setItem('forgeduel_user', JSON.stringify(data.user));
            }
          }).catch(function() {});
        })();

        // Logout handler
        var logoutBtn = document.getElementById('settings-logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            localStorage.removeItem('forgeduel_token');
            localStorage.removeItem('forgeduel_user');
            fetch('/api/auth/logout', { method: 'POST' }).catch(function(){});
            document.cookie = 'forgeduel_token=; path=/; max-age=0';
            closeSettings();
            refreshAuthSection();
            if (window.__forgeduelGame && window.__forgeduelGame.scene) {
              var scenes = window.__forgeduelGame.scene.getScenes(true);
              scenes.forEach(function(s) {
                if (s.scene.key !== 'MainMenuScene') {
                  s.scene.stop();
                }
              });
              var menu = window.__forgeduelGame.scene.getScene('MainMenuScene');
              if (menu) {
                menu.scene.restart();
              } else {
                window.__forgeduelGame.scene.start('MainMenuScene');
              }
            }
          });
        }

        window.__forgeduelSettings = settings;
        window.__forgeduelOpenSettings = openSettings;
        window.__forgeduelCloseSettings = closeSettings;
      })();
    </script>
  </body>
</html>
